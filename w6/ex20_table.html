<!DOCTYPE html>
<html>
<head>
<style>
  /* 表格基本設定：合併邊框  */
  table {
    border-collapse: collapse;
    width: 300px;
  }

  /* 設定表格、標頭與單元格邊框 [cite: 10, 11] */
  table, th, td {
    border: 1px solid black;
  }

  /* 設定標頭文字顏色與背景顏色  */
  th {
    background-color: grey;
    color: white;
    height: 40px; /* 參考 PDF 設定高度 [cite: 45] */
  }

  /* 使用 nth-child(even) 製作條紋背景 (或根據圖片指定列)  */
  /* 圖片中第 1、3 列為黃色 */
  tr:nth-child(odd) td {
    background-color: white;
  }
  
  /* 圖片中第 2 列為白色 (預設即為白色) */
  tr:nth-child(even) td {
    background-color: yellow;
  }

  /* 固定定位的 div 元素設定 [cite: 331, 332] */
  div.fixed {
    position: fixed; /* 固定在視窗  */
    top: 20px;       /* 依題目要求固定在右上方 [cite: 326] */
    right: 20px;
    width: 150px;
    border: 3px solid #73AD21; /* 綠色邊框  */
    padding: 10px;
  }
</style>
</head>
<body>

  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <div class="fixed">
    This div 
    element has
    position: fixed;
  </div>

</body>
</html>
