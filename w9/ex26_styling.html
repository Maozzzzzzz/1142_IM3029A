<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ex26</title>
    <style>
        /* 外盒：負責讓三張圖排排站，並且對齊上方 */
        .gallery-container {
            display: flex;
            justify-content: space-between; 
            
            /* 💡 魔法在這裡：flex-start 會讓裡面的東西全部貼齊天花板 */
            align-items: flex-start; 
            
            padding: 50px;
            max-width: 800px; /* 限制寬度，讓照片保持直立 */
            margin: 0 auto; 
        }

        /* 1. 左邊的圖：有圓角、不變形 */
        .img-left {
            width: 33%;
            height: 350px; /* 高度拉高 */
            border-radius: 18px;
            object-fit: cover; 
        }

        /* 2. 中間的圖：正圓形、相框邊框、不變形 */
        .img-center {
            width: 150px;
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            
            /* 拍立得邊框效果 */
            border: 2px solid #2f2f2f; 
            padding: 4px;              
            background-color: white;   
        }

        /* 3. 右邊的圖：預設變形 */
        .img-right {
            width: 33%;
            height: 350px; /* 高度拉高 */
            object-fit: fill; 
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <img class="img-left" src="https://picsum.photos/id/1018/800/600" alt="左圖-不變形">
        <img class="img-center" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&q=80" alt="風景-圓形">
        <img class="img-right" src="https://picsum.photos/id/1018/800/600" alt="右圖-拉長變形">
    </div>

</body>
</html>
